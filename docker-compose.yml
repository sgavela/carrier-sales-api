services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # SQLite DB and seed JSON persist across container restarts
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
